<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Académico</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
color:#fff;
background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
overflow-x:hidden;
}

/* Fondo estrellas */
.stars{
position:fixed;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
opacity:0.4;
z-index:-1;
}

/* Header */
header{
text-align:center;
padding:40px 20px;
}

h1{
font-size:40px;
margin:0;
}

.frase{
font-size:18px;
margin-top:10px;
opacity:0.8;
}

/* Grid carpetas */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
max-width:1100px;
margin:auto;
}

.folder{
padding:30px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
text-align:center;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.folder:hover{
transform:scale(1.05);
}

/* Colores degradados diferentes */
.s1{background:linear-gradient(45deg,#ff9a9e,#fad0c4);}
.s2{background:linear-gradient(45deg,#a18cd1,#fbc2eb);}
.s3{background:linear-gradient(45deg,#f6d365,#fda085);}
.s4{background:linear-gradient(45deg,#84fab0,#8fd3f4);}
.s5{background:linear-gradient(45deg,#fccb90,#d57eeb);}
.s6{background:linear-gradient(45deg,#e0c3fc,#8ec5fc);}
.s7{background:linear-gradient(45deg,#f093fb,#f5576c);}
.s8{background:linear-gradient(45deg,#43e97b,#38f9d7);}
.s9{background:linear-gradient(45deg,#fa709a,#fee140);}
.s10{background:linear-gradient(45deg,#30cfd0,#330867);}

/* Modal */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:linear-gradient(45deg,#ff7e5f,#feb47b);
color:#fff;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="stars"></div>

<header>
<h1>Mi Portafolio Académico</h1>
<p class="frase">"El éxito es la suma de pequeños esfuerzos repetidos cada día."</p>
</header>

<div class="container">

<div class="folder s1" onclick="openFolder(1)">Semestre 1</div>
<div class="folder s2" onclick="openFolder(2)">Semestre 2</div>
<div class="folder s3" onclick="openFolder(3)">Semestre 3</div>
<div class="folder s4" onclick="openFolder(4)">Semestre 4</div>
<div class="folder s5" onclick="openFolder(5)">Semestre 5</div>
<div class="folder s6" onclick="openFolder(6)">Semestre 6</div>
<div class="folder s7" onclick="openFolder(7)">Semestre 7</div>
<div class="folder s8" onclick="openFolder(8)">Semestre 8</div>
<div class="folder s9" onclick="openFolder(9)">Semestre 9</div>
<div class="folder s10" onclick="openFolder(10)">Semestre 10</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="title"></h2>
<p>Aquí puedes agregar archivos, proyectos o tareas de este semestre.</p>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
function openFolder(num){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText="Contenido del Semestre "+num;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
